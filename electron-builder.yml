# ────────────────────────────────────────────────────────
# Costerra ERP — Electron Builder Configuration
# Packages the Electron app as a macOS .dmg / Windows .exe
# with auto-update support via GitHub Releases.
# ────────────────────────────────────────────────────────

appId: com.costerra.erp
productName: Costerra ERP

directories:
  output: dist
  buildResources: build

# ─── macOS ──────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.business
  identity: null  # Unsigned builds — testers must bypass Gatekeeper
  hardenedRuntime: false

dmg:
  title: Costerra ERP

# ─── Windows ────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

# ─── Auto-Update ────────────────────────────────────────
publish:
  provider: github
  owner: jeronimovaldez96-svg
  repo: Costerra_ERP

# ─── Packaging ──────────────────────────────────────────
files:
  - out/**/*
  - node_modules/**/*
  - package.json

# Unpack native modules from asar.
asarUnpack:
  - "node_modules/@prisma/client/**/*"
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/sharp/**/*"
  - "node_modules/@img/**/*"

# Forcibly copy Prisma engines and dot-folders since electron-builder
# ignores them during the standard node_modules dependency tree walk.
extraResources:
  - from: "node_modules/.prisma"
    to: "app.asar.unpacked/node_modules/.prisma"
  - from: "node_modules/@prisma/engines"
    to: "app.asar.unpacked/node_modules/@prisma/engines"
