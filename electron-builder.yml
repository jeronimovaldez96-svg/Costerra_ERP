# ────────────────────────────────────────────────────────
# Costerra ERP — Electron Builder Configuration
# Packages the Electron app as a macOS .dmg / Windows .exe
# with auto-update support via GitHub Releases.
# ────────────────────────────────────────────────────────

appId: com.costerra.erp
productName: Costerra ERP

directories:
  output: dist
  buildResources: build

# ─── macOS ──────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch: [universal]
  category: public.app-category.business
  identity: null  # Unsigned builds — testers must bypass Gatekeeper
  hardenedRuntime: false

dmg:
  title: Costerra ERP

# ─── Windows ────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

# ─── Auto-Update ────────────────────────────────────────
publish:
  provider: github
  owner: jeronimovaldez96-svg
  repo: Costerra_ERP

# ─── Packaging ──────────────────────────────────────────
# Include compiled output, dependencies, and package.json
files:
  - out/**/*
  - node_modules/**/*
  - package.json

# Unpack native modules from asar so Node.js can load them.
# .node files and Prisma query engines cannot run from inside asar.
asarUnpack:
  - "node_modules/.prisma/**/*"
  - "node_modules/@prisma/engines/**/*"
  - "node_modules/@prisma/client/**/*"
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/sharp/**/*"
